# Fly.io app config for the Reputon backend.
# Deploy from the repo root with:
#   flyctl deploy

app = "reputon-backend"
primary_region = "iad"             # change to your preferred region

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  BACKEND_PORT = "8080"
  CORS_ORIGIN = "https://reputon.vercel.app"   # update after vercel deploy
  API_RATE_LIMIT_PER_MIN = "120"
  NEXT_PUBLIC_GENLAYER_RPC_URL = "https://studio.genlayer.com/api"
  NEXT_PUBLIC_GENLAYER_CHAIN_ID = "61999"
  NEXT_PUBLIC_REPUTON_CONTRACT_ADDRESS = "0xC64180D391C722CA461c3e492ef07ed084e0f747"
  NEXT_PUBLIC_REPUTON_NFT_CONTRACT_ADDRESS = "0x5116CfDB52bd96567777f86ac8d213D0715016C6"
  NEXT_PUBLIC_SYBIL_ORACLE_CONTRACT_ADDRESS = "0xe7E900542b54BeF274bE90e999BF6375C9463804"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine warm so the in-process scheduler (evaluation
  # job queue, webhook retries, stale-job sweep) keeps ticking. Without
  # this Fly auto-stops the VM when idle and queued evaluations stall.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/v1/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
